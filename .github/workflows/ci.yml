name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short

  lean-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/2_fv_core
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          set -e
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Install Lean toolchain
        run: lake --version
      - name: Build verified core (default target)
        run: lake build
      - name: Sanity check — no axiom-introducing `sorry` in default target
        run: |
          set -e
          if grep -RnE '^[^-/]*\bsorry\b' Core Axioms Proofs Scenarios; then
            echo "::error::sorry detected in default-target sources"
            exit 1
          fi
