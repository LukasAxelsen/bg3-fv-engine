name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short

  lean-build:
    runs-on: ubuntu-latest
    # Lean scenarios are v0.1-alpha and pinned for reproducibility, but a
    # number of files predate the Lean 4.29 List API rename and other recent
    # core changes. Job is informational; failures do not block CI.
    continue-on-error: true
    defaults:
      run:
        working-directory: src/2_fv_core
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          set -e
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Install Lean toolchain
        run: lake --version
      - name: Generate lake manifest
        run: lake update
      - name: Build
        run: lake build
